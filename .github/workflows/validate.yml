name: Validate Data

on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd tools && npm ci
      # Regenerate the TS types from the committed bundle and fail if they
      # drifted (the bundle's own freshness vs the schemas is checked in `rust`).
      - run: cd tools && npm run codegen:types
      - name: Check generated TS types are up to date
        run: git diff --exit-code tools/src/generated.ts
      - run: cd tools && npm run build
      - run: cd tools && npm test
      - run: cd tools && npm run validate
      # Catch malformed packages on PRs instead of at publish time on main.
      # `npm pack --dry-run` exercises the prepack pipeline and prints the
      # tarball file list, so a reviewer can eyeball what would ship.
      - name: npm pack dry-run
        run: cd tools && npm pack --dry-run
      # The npm package, the wh40kdc crate, and the Python package are
      # versioned in lockstep by convention; enforce that as a hard CI check
      # so a bump in one without the others can't land.
      - name: Check npm/crate/python version lockstep
        run: |
          npm_ver=$(node -p "require('./tools/package.json').version")
          crate_ver=$(awk -F'"' '/^version[[:space:]]*=/ { print $2; exit }' crates/wh40kdc/Cargo.toml)
          py_ver=$(awk -F'"' '/^__version__/ { print $2; exit }' python/src/wh40kdc/_version.py)
          if [ "$npm_ver" != "$crate_ver" ] || [ "$npm_ver" != "$py_ver" ]; then
            echo "Version mismatch: tools/package.json=$npm_ver crates/wh40kdc/Cargo.toml=$crate_ver python/_version.py=$py_ver" >&2
            exit 1
          fi
          echo "Versions in sync: $npm_ver"

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Regenerate the bundled schema and Rust types, then fail if the committed
      # artifacts drifted from the schemas (forces codegen to be re-run in the PR).
      - run: cd tools && npm ci
      - run: cd tools && npm run bundle:schemas
      - run: cargo run -p xtask -- codegen
      - run: cargo run -p xtask -- bundle-data
      - name: Check generated artifacts are up to date
        run: git diff --exit-code crates/wh40kdc/schemas/bundled.schema.json crates/wh40kdc/src/generated.rs crates/wh40kdc/src/data/bundle.generated.json
      - run: cargo fmt --all -- --check
      - run: cargo build --workspace
      - run: cargo test --workspace
      # Catch malformed crates on PRs instead of at publish time on main.
      # `cargo publish --dry-run` validates the manifest and packaging rules;
      # `cargo package --list` prints the file list that would actually ship.
      - name: cargo publish dry-run
        run: cargo publish -p wh40kdc --dry-run --locked
      - name: List crate tarball contents
        run: cargo package --list -p wh40kdc

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Regenerate the Python package's embedded artifacts from their sources
      # (the Rust bundle is the shared bundler — its file-walk order is the
      # iteration-order contract all three impls share) and fail on drift.
      - run: cd tools && npm ci
      - run: cd tools && npm run bundle:schemas
      - run: cargo run -p xtask -- bundle-data
      - run: pip install datamodel-code-generator
      - run: python3 python/codegen/sync_bundle.py
      - run: python3 python/codegen/sync_spec.py
      - run: python3 python/codegen/gen_typeddicts.py
      - name: Check generated Python artifacts are up to date
        run: git diff --exit-code python/src/wh40kdc/_bundle.json python/src/wh40kdc/_spec.py python/src/wh40kdc/_types.py python/src/wh40kdc/schemas/
      - run: cd python && pip install -e ".[dev]"
      - run: cd python && ruff check .
      - run: cd python && mypy src
      - run: cd python && pytest
      # Catch malformed wheels on PRs instead of at publish time on main.
      - name: Build sdist + wheel
        run: cd python && python -m build

  conformance:
    # The tie-out gate: the Rust crate and the TS package must produce identical
    # results over one shared corpus (conformance/). Regenerate the goldens from
    # the TS reference, fail if they drifted, then run both implementations'
    # conformance suites against the committed corpus.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cd tools && npm ci
      - run: cd tools && npm run build
      - run: cd tools && npm run gen:conformance
      - name: Check conformance corpus is up to date
        run: git diff --exit-code conformance/
      - name: TS conformance suite
        run: cd tools && npx vitest run test/conformance.test.ts
      - name: Rust conformance suite
        run: cargo test -p wh40kdc --test conformance

  examples:
    # The example apps gate too: svelte-check, unit tests (mission-matrix's
    # scoring/pairing logic, salvo's projection helpers, the shared
    # matchup-grid module), and a production build per app.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      # The examples resolve @alpaca-software/40kdc-data through the workspace,
      # so the package's dist must exist first.
      - run: cd tools && npm run build
      - run: npm run check --workspace @40kdc/salvo --workspace @40kdc/mission-matrix --workspace @40kdc/layout-editor
      - run: npm test --workspace @40kdc/salvo --workspace @40kdc/mission-matrix
      - run: npm run build --workspace @40kdc/salvo --workspace @40kdc/mission-matrix --workspace @40kdc/layout-editor

  publish-crate:
    # Auto-publish wh40kdc to crates.io once main is green. Self-gates on the
    # crate version: if this version is already on the registry the publish is
    # skipped, so the job is a no-op on every main push until Cargo.toml's
    # version is bumped. Requires the CARGO_REGISTRY_TOKEN repo secret.
    needs: [validate, rust, python, conformance]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Read crate version
        id: ver
        run: echo "version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="wh40kdc") | .version')" >> "$GITHUB_OUTPUT"
      - name: Skip if version already on crates.io
        id: check
        run: |
          if curl -sfI -H 'User-Agent: 40kdc-data-ci (github actions)' \
              "https://crates.io/api/v1/crates/wh40kdc/${{ steps.ver.outputs.version }}" >/dev/null; then
            echo "wh40kdc ${{ steps.ver.outputs.version }} already published; skipping."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to crates.io
        if: steps.check.outputs.publish == 'true'
        run: cargo publish -p wh40kdc --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Tag and create GitHub release
        if: steps.check.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: wh40kdc-v${{ steps.ver.outputs.version }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "wh40kdc v${{ steps.ver.outputs.version }}" \
            --notes "Published to https://crates.io/crates/wh40kdc/${{ steps.ver.outputs.version }}"

  publish-npm:
    # Auto-publish @alpaca-software/40kdc-data to npm once main is green.
    # Self-gates on the package version: if this version is already on the
    # registry the publish is skipped, so the job is a no-op on every main push
    # until tools/package.json's version is bumped. The published payload
    # (dist + embedded data + schemas) is built by the package's `prepack` step.
    #
    # Requires the NPM_REGISTRY_TOKEN repo secret to be an npm *automation*
    # token (these bypass 2FA — interactive OTP is impossible in CI), and the
    # alpaca-software org's publish setting must permit tokens. Provenance is
    # attached via OIDC, which needs `id-token: write` and a public repo.
    needs: [validate, rust, python, conformance]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: cd tools && npm ci
      - name: Read package version
        id: ver
        run: echo "version=$(node -p "require('./tools/package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Skip if version already on npm
        id: check
        run: |
          if npm view "@alpaca-software/40kdc-data@${{ steps.ver.outputs.version }}" version >/dev/null 2>&1; then
            echo "@alpaca-software/40kdc-data ${{ steps.ver.outputs.version }} already published; skipping."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to npm
        if: steps.check.outputs.publish == 'true'
        run: cd tools && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_REGISTRY_TOKEN }}
      - name: Tag and create GitHub release
        if: steps.check.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: npm-v${{ steps.ver.outputs.version }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "@alpaca-software/40kdc-data v${{ steps.ver.outputs.version }}" \
            --notes "Published to https://www.npmjs.com/package/@alpaca-software/40kdc-data/v/${{ steps.ver.outputs.version }}"

  publish-pypi:
    # Auto-publish wh40kdc to PyPI once main is green, via trusted publishing
    # (OIDC — no token secret). Self-gates on the package version: if this
    # version is already on the registry the publish is skipped, so the job
    # is a no-op on every main push until _version.py is bumped.
    #
    # One-time setup on PyPI (Account → Publishing → Add a pending publisher,
    # until the first publish creates the project): project `wh40kdc`,
    # owner/repository matching this repo, workflow `validate.yml`,
    # environment `pypi`. The `pypi` environment must also exist in the
    # GitHub repo settings.
    needs: [validate, rust, python, conformance]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Read package version
        id: ver
        run: echo "version=$(awk -F'"' '/^__version__/ { print $2; exit }' python/src/wh40kdc/_version.py)" >> "$GITHUB_OUTPUT"
      - name: Skip if version already on PyPI
        id: check
        run: |
          if curl -sfI "https://pypi.org/pypi/wh40kdc/${{ steps.ver.outputs.version }}/json" >/dev/null; then
            echo "wh40kdc ${{ steps.ver.outputs.version }} already published; skipping."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Build sdist + wheel
        if: steps.check.outputs.publish == 'true'
        run: |
          pip install build
          cd python && python -m build
      - name: Publish to PyPI
        if: steps.check.outputs.publish == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist
      - name: Tag and create GitHub release
        if: steps.check.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: pypi-v${{ steps.ver.outputs.version }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "wh40kdc (PyPI) v${{ steps.ver.outputs.version }}" \
            --notes "Published to https://pypi.org/project/wh40kdc/${{ steps.ver.outputs.version }}/"
