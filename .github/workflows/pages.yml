name: GitHub Pages (redirects)

# 40kdc moved off GitHub Pages to per-subdomain Cloudflare hosting (see
# deploy.yml). This workflow no longer builds the apps — it publishes lightweight
# redirect stubs so old Pages bookmarks
# (<owner>.github.io/40kdc-data/..., /examples/<name>/, /api/) don't 404 and
# point at the new *.alpacasoft.dev homes instead.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate redirect stubs
        run: |
          set -euo pipefail
          # stub <output-path> <destination-url>
          stub() {
            local path="$1" url="$2"
            mkdir -p "$(dirname "$path")"
            cat > "$path" <<HTML
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <meta http-equiv="refresh" content="0; url=${url}" />
              <link rel="canonical" href="${url}" />
              <meta name="robots" content="noindex" />
              <title>Moved to ${url}</title>
            </head>
            <body>
              <p>This page has moved to <a href="${url}">${url}</a>.</p>
            </body>
          </html>
          HTML
          }

          stub _site/index.html                       https://40kdc.alpacasoft.dev
          stub _site/api/index.html                    https://40kdc.alpacasoft.dev/api/
          stub _site/examples/salvo/index.html         https://salvo.alpacasoft.dev
          stub _site/examples/mission-matrix/index.html https://mission-matrix.alpacasoft.dev
          stub _site/examples/layout-editor/index.html  https://layout-editor.alpacasoft.dev
          ls -R _site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
