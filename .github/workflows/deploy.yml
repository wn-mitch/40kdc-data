name: Deploy (Cloudflare)

# Builds the landing site + every example toollet and deploys each to its
# own *.alpacasoft.dev subdomain as a Workers static-assets site. Replaces the
# old GitHub Pages hosting (pages.yml now only publishes redirect stubs).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Token scopes: Workers Scripts:Edit, Workers Routes:Edit, SSL/Certs:Edit,
      # Zone:Read on the alpacasoft.dev zone. wrangler reads it from the env.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install workspaces
        run: npm ci

      - name: Build npm package + TypeDoc HTML
        run: |
          cd tools
          npm run build
          npm run docs:api:html

      - name: Build example toollets
        run: |
          set -euo pipefail
          for dir in examples/*/; do
            name=$(basename "$dir")
            if [ -f "$dir/package.json" ] && node -e "const p=require('./$dir/package.json'); process.exit(p.scripts && p.scripts.build ? 0 : 1)"; then
              echo "::group::Building $name"
              # No TOOLLET_BASE: each example deploys at its own subdomain root (base "/").
              npm --workspace "examples/$name" run build
              echo "::endgroup::"
            fi
          done

      - name: Assemble landing site (index.html + /api + static assets)
        run: |
          set -euo pipefail
          rm -rf docs-site/dist
          mkdir -p docs-site/dist/api
          cp docs-site/index.html docs-site/dist/index.html
          cp docs-site/favicon-32x32.png docs-site/dist/favicon-32x32.png
          cp docs-site/og-image.png docs-site/dist/og-image.png
          cp -R tools/docs/api-html/. docs-site/dist/api/

      - name: Deploy landing site
        run: npx wrangler deploy --config docs-site/wrangler.jsonc

      - name: Deploy example toollets
        run: |
          set -euo pipefail
          for dir in examples/*/; do
            name=$(basename "$dir")
            if [ -f "$dir/wrangler.jsonc" ]; then
              echo "::group::Deploying $name"
              npx wrangler deploy --config "$dir/wrangler.jsonc"
              echo "::endgroup::"
            fi
          done

      # The sync worker deploys only once its D1 database id is real (the
      # placeholder is all-zeros until the operator runs `wrangler d1 create
      # 40kdc_sync` and commits the id). Token additionally needs D1:Edit.
      - name: Deploy sync worker (docs + shortlinks)
        run: |
          set -euo pipefail
          if grep -q "00000000-0000-0000-0000-000000000000" workers/sync/wrangler.jsonc; then
            echo "::notice::workers/sync: D1 database_id still placeholder — skipping deploy"
            exit 0
          fi
          npx wrangler d1 migrations apply 40kdc_sync --remote --config workers/sync/wrangler.jsonc
          npx wrangler deploy --config workers/sync/wrangler.jsonc
